# Meson cross file TEMPLATE for cross-compiling GLib/GObject/GIO to i686
# PureUnix (docs/pcmanfm-port.md phase 3/6) — the same role
# tools/pureunix-qt-toolchain.cmake plays for Qt's CMake build, just for
# Meson (GLib dropped autotools years ago; Meson is its only real build
# system now).
#
# Template, not a ready-to-use cross file: @REPO_ROOT@ below is
# substituted with this repo's real absolute path by tools/build-glib.sh
# before Meson ever sees it (Meson cross files don't support their own
# variable substitution, unlike CMake toolchain files' ${...} syntax).
#
# [host_machine].system is deliberately 'none' (not 'linux'/'windows'/
# any real OS name) — PureUnix isn't any of the OSes GLib's own
# meson.build checks for by name (`if host_system == 'windows'` etc are
# the near-universal pattern throughout that file, checked directly
# against meson.build source, not assumed) and 'none' is Meson's own
# convention for "no recognized/relevant OS", used by embedded/bare-metal
# cross files generally. Falling through to each check's implicit "else,
# assume generic POSIX" branch is exactly the real, correct behavior for
# this real (if freestanding-libc-based) POSIX target. Unlike
# tools/pureunix-qt-toolchain.cmake's own CMAKE_SYSTEM_NAME choice
# (Linux, not Generic — CMake ties a derived `UNIX` boolean to that
# setting, which gates whole source files' inclusion, not just
# preprocessor branches) Meson has no analogous derived boolean here;
# every `host_system ==` call site checked is a plain string comparison
# with an implicit generic-POSIX fallback, so 'none' carries none of
# that same risk.
#
# newlib_crt0_asm.o/newlib_crt0.o/newlib_syscalls.o are listed directly
# in c_link_args/cpp_link_args (real object file paths, not `-l`
# references) so Meson's own bootstrap "does the compiler work" sanity
# check succeeds (this platform is always -nostdlib) — unlike libffi's/
# PCRE2's autotools+libtool builds (see
# gotcha_libffi_cross_build_linker_ld_libtool.md), Meson archives static
# libraries directly with `ar` from just that target's own object files,
# never re-running the full c_link_args-laden link line against a
# library archive the way libtool's automake-generated Makefiles do — so
# there's no equivalent "cannot build library from non-libtool objects"
# problem here to route around.

# c/cpp point at thin wrapper scripts (tools/i686-elf-gcc-glib-wrapper.sh/
# i686-elf-gpp-glib-wrapper.sh), not the raw cross-compiler — see those
# scripts' own comment: Meson's built-in `dependency('threads')`
# unconditionally appends -pthread on any non-Darwin/non-Windows target,
# a real GCC convenience flag our cross-compiler was never configured to
# understand at all (it doesn't need it either — see that comment).
[binaries]
c = '@REPO_ROOT@/tools/i686-elf-gcc-glib-wrapper.sh'
cpp = '@REPO_ROOT@/tools/i686-elf-gpp-glib-wrapper.sh'
ar = 'i686-elf-ar'
strip = 'i686-elf-strip'
pkg-config = 'pkg-config'

[built-in options]
# -D_POSIX_HOST_NAME_MAX=255: a real, standard POSIX.1-2008 constant
# (glib/ghostutils.c needs it) that newlib's own <limits.h> never
# defines for this target. Scoped to just this GLib build (not added to
# user/newlib_compat/, which every other PureUNIX program's real
# <limits.h> also resolves through) since nothing else in this repo
# needs it yet — the real, standard value, not invented.
#
# -Wno-format: this target's own newlib/GCC combination defines uint32_t
# as 'unsigned long', not 'unsigned int' (both are 4 bytes on i686, but
# GCC's -Wformat still distinguishes the type names) — a real, pre-
# existing toolchain quirk already documented from the Qt6/PCRE2 ports
# (gotcha_newlib_long_long_io.md and PCRE2's own
# -Wno-incompatible-pointer-types), not a bug in GLib's own %u/%d-using
# source (girepository/girnode.c etc). GLib's own meson.build sets
# -Werror=format=2 project-wide; this flag is placed after that in the
# real compile invocation (Meson appends cross-file c_args after its own
# built-in warning flags), so it wins, same mechanism already relied on
# by girepository/cmph/meson.build's own per-target custom_c_args list
# (see third_party/glib/patches/0002-cmph-suppress-format-warning.patch).
c_args = ['-std=gnu99', '-ffreestanding', '-fno-stack-protector', '-fno-pic', '-fno-pie', '-m32', '-march=i686', '-fno-builtin', '-D__PUREUNIX__', '-D_POSIX_THREADS=1', '-D_UNIX98_THREAD_MUTEX_ATTRIBUTES=1', '-D_POSIX_READER_WRITER_LOCKS=1', '-D_POSIX_HOST_NAME_MAX=255', '-DSSIZE_MAX=2147483647', '-Wno-format', '-isystem', '@REPO_ROOT@/user/newlib_compat', '-isystem', '@REPO_ROOT@/third_party/newlib/i686-elf/include']
c_link_args = ['-T', '@REPO_ROOT@/user/linker.ld', '-nostdlib', '-m32', '-L@REPO_ROOT@/third_party/newlib/i686-elf/lib', '@REPO_ROOT@/build/user/newlib_crt0_asm.o', '@REPO_ROOT@/build/user/newlib_crt0.o', '@REPO_ROOT@/build/user/newlib_syscalls.o', '-lc', '-lm', '-lgcc']
cpp_args = ['-std=gnu++17', '-fno-stack-protector', '-fno-pic', '-fno-pie', '-m32', '-march=i686', '-D__PUREUNIX__', '-D_POSIX_THREADS=1', '-D_UNIX98_THREAD_MUTEX_ATTRIBUTES=1', '-D_POSIX_READER_WRITER_LOCKS=1', '-Wno-format', '-isystem', '@REPO_ROOT@/user/newlib_compat', '-isystem', '@REPO_ROOT@/third_party/newlib/i686-elf/include']
cpp_link_args = ['-T', '@REPO_ROOT@/user/linker.ld', '-nostdlib', '-m32', '-L@REPO_ROOT@/third_party/newlib/i686-elf/lib', '@REPO_ROOT@/build/user/newlib_crt0_asm.o', '@REPO_ROOT@/build/user/newlib_crt0.o', '@REPO_ROOT@/build/user/newlib_syscalls.o', '-lc', '-lm', '-lgcc']

[host_machine]
system = 'none'
cpu_family = 'x86'
cpu = 'i686'
endian = 'little'

[properties]
needs_exe_wrapper = true
