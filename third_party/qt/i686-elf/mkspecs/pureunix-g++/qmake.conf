#
# qmake configuration for pureunix-g++
#
# PureUnix's first Qt mkspec — see third_party/qt/README.md for how this
# gets copied into the vendored qtbase source tree by tools/build-qt.sh
# before configuring, and docs/qt-port.md for why a new platform mkspec is
# the right way to teach Qt's build system about PureUnix (rather than
# scattering __PUREUNIX__ conditionals through unrelated Qt source).
#
# Modeled on mkspecs/freebsd-g++ (the closest existing "generic Unix, real
# gcc, no Linux-specific glibc assumptions" template) rather than
# linux-g++, then stripped further: no pthread (PureUnix has no threading
# at all - docs/qt-port.md section 3), no X11/OpenGL libs (unused, those
# features are disabled at configure time).

MAKEFILE_GENERATOR      = UNIX
QMAKE_PLATFORM          += pureunix unix posix

include(../common/unix.conf)
include(../common/gcc-base-unix.conf)
include(../common/g++-unix.conf)

# src/corelib/global/qsystemdetection.h has no built-in compiler macro to
# detect PureUnix by (it's a from-scratch OS); a real, minimal upstream Qt
# patch added a Q_OS_PUREUNIX branch there keyed off this exact define,
# following the same "set from the mkspec, not autodetected" convention
# that file's own Q_OS_VXWORKS branch already documents. Needed here for
# qmake-based *application* builds against this Qt; the Qt build itself
# (CMake-based) gets it from tools/qt-toolchain.cmake instead.
QMAKE_CFLAGS            += -D__PUREUNIX__
QMAKE_CXXFLAGS           += -D__PUREUNIX__

# No threading of any kind exists on PureUnix (see docs/qt-port.md section
# 3) - real -pthread flags/libs would be meaningless here, and Qt is
# configured with FEATURE_thread=OFF to match.
QMAKE_CFLAGS_THREAD     =
QMAKE_CXXFLAGS_THREAD   =
QMAKE_LFLAGS_THREAD     =
QMAKE_LIBS_THREAD       =
QMAKE_LIBS_DYNLOAD      =
QMAKE_LIBS_EXECINFO     =

QMAKE_AR                = i686-elf-ar cqs
QMAKE_OBJCOPY           = i686-elf-objcopy
QMAKE_NM                = i686-elf-nm -P
QMAKE_RANLIB            = i686-elf-ranlib
QMAKE_STRIP             = i686-elf-strip

load(qt_config)
